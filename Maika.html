<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Maika — Quản lý Nhà trẻ</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: #F5F3FF; font-family: 'Nunito', sans-serif; color: #1E1B4B; font-size: 14px; }
  #root { display: flex; min-height: 100vh; width: 100%; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #DDD6FE; border-radius: 99px; }
  ::-webkit-scrollbar-thumb:hover { background: #7C3AED; }

  /* Global button hover effects */
  button { font-family: 'Nunito', sans-serif; transition: all 0.18s cubic-bezier(0.34,1.56,0.64,1); }
  button:hover { transform: translateY(-2px); }
  button:active { transform: translateY(0px) scale(0.97); }

  /* Primary gradient buttons */
  .btn-primary {
    padding: 11px 24px; border-radius: 12px; border: none;
    background: linear-gradient(135deg, #6D28D9, #8B5CF6);
    color: #fff; font-family: 'Nunito', sans-serif;
    font-weight: 800; font-size: 14px; cursor: pointer;
    box-shadow: 0 4px 14px rgba(109,40,217,0.35);
    transition: all 0.18s cubic-bezier(0.34,1.56,0.64,1);
  }
  .btn-primary:hover {
    box-shadow: 0 8px 24px rgba(109,40,217,0.45);
    transform: translateY(-2px);
  }

  /* Input / select base */
  input, select, textarea {
    font-family: 'Nunito', sans-serif;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  input:focus, select:focus, textarea:focus {
    border-color: #7C3AED !important;
    box-shadow: 0 0 0 3px rgba(124,58,237,0.12) !important;
    outline: none;
  }

  /* Card hover */
  .card-hover { transition: transform 0.18s, box-shadow 0.18s; }
  .card-hover:hover { transform: translateY(-3px); box-shadow: 0 8px 28px rgba(109,40,217,0.12) !important; }

  /* Table row hover */
  tr.row-hover:hover td { background: #F5F3FF !important; }

  /* Smooth page transitions */
  main > div { animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Data layer (plain JS) -->
<script src="bb-data.js"></script>

<!-- Component files (JSX via Babel) -->
<script type="text/babel" src="bb-sidebar.jsx"></script>
<script type="text/babel" src="bb-dashboard.jsx"></script>
<script type="text/babel" src="bb-students.jsx"></script>
<script type="text/babel" src="bb-teachers.jsx"></script>
<script type="text/babel" src="bb-attendance.jsx"></script>
<script type="text/babel" src="bb-finance.jsx"></script>
<script type="text/babel" src="bb-communication.jsx"></script>
<script type="text/babel" src="bb-calendar.jsx"></script>
<script type="text/babel" src="bb-analytics.jsx"></script>
<script type="text/babel" src="bb-resources.jsx"></script>

<!-- Main App -->
<script type="text/babel">
const { useState, useEffect } = React;

// Login screen
function LoginScreen({ onLogin }) {
  const [user, setUser] = useState('admin');
  const [pass, setPass] = useState('');
  const [err, setErr] = useState('');
  const [loading, setLoading] = useState(false);

  function handleLogin(e) {
    e.preventDefault();
    setLoading(true);
    setTimeout(() => {
      if (pass === '123456' || pass === 'maika') {
        onLogin();
      } else {
        setErr('Mật khẩu không đúng. Thử: 123456');
        setLoading(false);
      }
    }, 600);
  }

  return (
    <div style={{ minHeight:'100vh', background:'linear-gradient(135deg,#1E1B4B 0%,#2D2870 50%,#4C1D95 100%)', display:'flex', alignItems:'center', justifyContent:'center', position:'relative', overflow:'hidden' }}>
      {/* Decorative circles */}
      <div style={{ position:'absolute', width:400, height:400, borderRadius:'50%', background:'rgba(167,139,250,0.08)', top:-100, right:-100, pointerEvents:'none' }}></div>
      <div style={{ position:'absolute', width:300, height:300, borderRadius:'50%', background:'rgba(124,58,237,0.1)', bottom:-80, left:-80, pointerEvents:'none' }}></div>

      <div style={{ textAlign:'center', maxWidth:420, width:'100%', padding:'0 24px', position:'relative', zIndex:1 }}>
        {/* Logo */}
        <div style={{ marginBottom:32 }}>
          <div style={{ width:76, height:76, borderRadius:22, background:'linear-gradient(135deg,#6D28D9,#A78BFA)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:42, margin:'0 auto 16px', boxShadow:'0 8px 32px rgba(109,40,217,0.5)' }}>🌸</div>
          <div style={{ fontWeight:900, fontSize:34, color:'#FFFFFF', letterSpacing:-1 }}>Maika</div>
          <div style={{ fontSize:14, color:'#A78BFA', fontWeight:600, marginTop:4, letterSpacing:0.5 }}>Hệ thống quản lý nhà trẻ</div>
        </div>

        {/* Login card */}
        <div style={{ background:'rgba(255,255,255,0.97)', borderRadius:24, padding:'36px 32px', boxShadow:'0 24px 60px rgba(0,0,0,0.3)', backdropFilter:'blur(20px)' }}>
          <div style={{ fontWeight:800, fontSize:20, color:'#1E1B4B', marginBottom:8 }}>Chào mừng trở lại</div>
          <div style={{ fontSize:13, color:'#7C6D9B', marginBottom:28 }}>Đăng nhập để quản lý trường</div>
          <form onSubmit={handleLogin} style={{ display:'flex', flexDirection:'column', gap:16 }}>
            <div style={{ textAlign:'left' }}>
              <label style={{ fontSize:12, fontWeight:700, color:'#5B5490', display:'block', marginBottom:6 }}>Vai trò</label>
              <select value={user} onChange={e => setUser(e.target.value)} style={{ width:'100%', padding:'12px 16px', borderRadius:12, border:'1.5px solid #DDD6FE', fontFamily:'Nunito,sans-serif', fontSize:14, color:'#1E1B4B', outline:'none', background:'#F8F7FF' }}>
                <option value="admin">👑 Hiệu trưởng / Admin</option>
                <option value="teacher">👩‍🏫 Giáo viên</option>
                <option value="parent">👨‍👩‍👧 Phụ huynh</option>
              </select>
            </div>
            <div style={{ textAlign:'left' }}>
              <label style={{ fontSize:12, fontWeight:700, color:'#5B5490', display:'block', marginBottom:6 }}>Mật khẩu</label>
              <input type="password" value={pass} onChange={e => setPass(e.target.value)} placeholder="Nhập mật khẩu..." style={{ width:'100%', padding:'12px 16px', borderRadius:12, border:'1.5px solid #DDD6FE', fontFamily:'Nunito,sans-serif', fontSize:14, color:'#1E1B4B', outline:'none', boxSizing:'border-box', background:'#F8F7FF' }} autoFocus />
            </div>
            {err && <div style={{ fontSize:12, color:'#DC2626', fontWeight:600, background:'#FEF2F2', borderRadius:10, padding:'10px 14px' }}>{err}</div>}
            <button type="submit" disabled={loading} style={{ padding:'14px', borderRadius:14, border:'none', background: loading ? '#DDD6FE' : 'linear-gradient(135deg,#6D28D9,#8B5CF6)', color: loading ? '#7C6D9B' : '#fff', fontFamily:'Nunito,sans-serif', fontWeight:800, fontSize:15, cursor: loading ? 'not-allowed' : 'pointer', boxShadow: loading ? 'none' : '0 6px 20px rgba(109,40,217,0.4)', marginTop:4 }}>
              {loading ? 'Đang đăng nhập...' : 'Đăng nhập →'}
            </button>
          </form>
          <div style={{ marginTop:20, fontSize:12, color:'#9B93C9', background:'#F5F3FF', borderRadius:8, padding:'8px 12px' }}>Mật khẩu demo: <strong style={{color:'#6D28D9'}}>123456</strong></div>
        </div>
      </div>
    </div>
  );
}

// Main App
function App() {
  const [loggedIn, setLoggedIn] = useState(() => !!localStorage.getItem('bb_session'));
  const [page, setPage] = useState(() => localStorage.getItem('bb_page') || 'dashboard');

  function handleLogin() {
    localStorage.setItem('bb_session', '1');
    setLoggedIn(true);
  }

  function handleNav(p) {
    setPage(p);
    localStorage.setItem('bb_page', p);
  }

  useEffect(() => {
    localStorage.setItem('bb_page', page);
  }, [page]);

  if (!loggedIn) return <LoginScreen onLogin={handleLogin} />;

  const db = BB.getDB();
  const unread = db.messages.filter(m => !m.read && m.fromRole === 'parent').length;

  const pageMap = {
    dashboard: { title:'Tổng quan', subtitle:'Maika Nursery School', component: <Dashboard onNav={handleNav} /> },
    students:  { title:'Quản lý học sinh', subtitle:`${db.students.filter(s=>s.status==='active').length} học sinh đang học`, component: <Students /> },
    teachers:  { title:'Quản lý giáo viên', subtitle:`${db.teachers.filter(t=>t.status==='active').length} giáo viên`, component: <Teachers /> },
    attendance:{ title:'Điểm danh', subtitle:'Theo dõi chuyên cần', component: <Attendance /> },
    reports:   { title:'Nhật ký ngày', subtitle:'Bữa ăn · Giấc ngủ · Tâm trạng', component: <DailyReports /> },
    finance:   { title:'Quản lý học phí', subtitle:'Thu chi và tài chính', component: <Finance /> },
    messages:  { title:'Tin nhắn', subtitle:'Giao tiếp với phụ huynh', component: <Messages /> },
    calendar:  { title:'Lịch sự kiện', subtitle:'Lịch học và hoạt động', component: <CalendarView /> },
    analytics: { title:'Báo cáo & Phân tích', subtitle:'Thống kê tổng hợp', component: <Analytics /> },
    resources: { title:'Thư viện tài nguyên', subtitle:'Giáo cụ và học liệu', component: <Resources /> },
    gamification:{ title:'Thành tích & Khen thưởng', subtitle:'Tạo động lực cho bé', component: <Gamification /> },
  };

  const current = pageMap[page] || pageMap.dashboard;

  return (
    <div style={{ display:'flex', minHeight:'100vh', width:'100vw' }}>
      <Sidebar active={page} onNav={handleNav} unreadCount={unread} />
      <div style={{ marginLeft:248, flex:1, display:'flex', flexDirection:'column', minHeight:'100vh', minWidth:0, width:'calc(100vw - 248px)' }}>
        <TopBar title={current.title} subtitle={current.subtitle} />
        <main style={{ flex:1, overflowY:'auto', background:'#F5F3FF' }}>
          {current.component}
        </main>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
