<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Maika — Cổng Phụ Huynh</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:#F5F3FF;color:#1E1B4B;min-height:100vh}
button,input,select,textarea{font-family:'Nunito',sans-serif}
button{transition:all 0.18s cubic-bezier(0.34,1.56,0.64,1);cursor:pointer}
button:hover{transform:translateY(-2px)}
button:active{transform:scale(0.97)}
a{text-decoration:none;color:inherit}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#DDD6FE;border-radius:99px}
input:focus,textarea:focus{outline:none;border-color:#7C3AED!important;box-shadow:0 0 0 3px rgba(124,58,237,0.12)!important}

.header{background:linear-gradient(135deg,#1E1B4B,#2D2870,#4C1D95);padding:0 28px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(30,27,75,0.3)}
.header-logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#7C3AED,#A78BFA);display:flex;align-items:center;justify-content:center;font-size:18px}
.logo-text{font-weight:900;font-size:16px;color:#fff}
.header-user{display:flex;align-items:center;gap:12px}
.user-badge{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.18);border-radius:50px;padding:6px 14px;color:#C4B5FD;font-size:13px;font-weight:700;display:flex;align-items:center;gap:8px}
.user-av{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#F59E0B,#FBBF24);display:flex;align-items:center;justify-content:center;color:#1E1B4B;font-weight:800;font-size:11px}

.tabs{background:#fff;border-bottom:1px solid #EDE9FE;padding:0 28px;display:flex;gap:0;position:sticky;top:64px;z-index:90;box-shadow:0 1px 8px rgba(109,40,217,0.05)}
.tab-btn{padding:16px 24px;border:none;background:none;font-weight:700;font-size:14px;color:#7C6D9B;cursor:pointer;border-bottom:2.5px solid transparent;transition:all 0.15s;display:flex;align-items:center;gap:7px}
.tab-btn:hover{color:#6D28D9;transform:none;background:#F8F7FF}
.tab-btn.active{color:#6D28D9;border-bottom-color:#6D28D9}

.main{max-width:960px;margin:0 auto;padding:28px 24px}

/* ANN */
.ann-card{background:#fff;border-radius:18px;padding:22px 24px;margin-bottom:14px;box-shadow:0 2px 14px rgba(109,40,217,0.07);border-left:4px solid #7C3AED;transition:all 0.2s;cursor:pointer}
.ann-card:hover{box-shadow:0 6px 22px rgba(109,40,217,0.13);transform:translateY(-2px)}
.ann-card.important{border-left-color:#F59E0B;background:linear-gradient(135deg,#FFFBEB,#FFF)}
.ann-header{display:flex;gap:14px;align-items:flex-start}
.ann-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.ann-tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:800;padding:3px 10px;border-radius:50px;margin-bottom:6px}
.ann-title{font-weight:800;font-size:15px;color:#1E1B4B;margin-bottom:6px}
.ann-date{font-size:12px;color:#7C6D9B;font-weight:600}
.ann-body{font-size:14px;color:#4B4899;line-height:1.75;margin-top:14px;padding-top:14px;border-top:1.5px dashed #EDE9FE;display:none;white-space:pre-wrap}
.ann-card.open .ann-body{display:block}

/* GALLERY */
.gallery-filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.gf-btn{padding:7px 16px;border-radius:50px;border:1.5px solid #DDD6FE;background:#fff;color:#7C6D9B;font-weight:700;font-size:13px;cursor:pointer;transition:all 0.15s}
.gf-btn.active{background:#6D28D9;color:#fff;border-color:#6D28D9;box-shadow:0 4px 12px rgba(109,40,217,0.3)}
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.photo-card{border-radius:16px;overflow:hidden;aspect-ratio:4/3;position:relative;cursor:pointer;transition:transform 0.2s}
.photo-card:hover{transform:scale(1.04)}
.photo-inner{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;font-weight:700;font-size:13px;color:rgba(255,255,255,0.9)}
.photo-overlay{position:absolute;inset:0;background:linear-gradient(0deg,rgba(30,27,75,0.85),transparent 55%);opacity:0;transition:opacity 0.2s;display:flex;align-items:flex-end;padding:12px}
.photo-card:hover .photo-overlay{opacity:1}
.photo-overlay span{color:#fff;font-size:12px;font-weight:700}
.photo-date{position:absolute;top:8px;right:8px;background:rgba(30,27,75,0.7);color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;backdrop-filter:blur(4px)}

/* REPORT */
.report-hero{background:linear-gradient(135deg,#6D28D9,#8B5CF6);border-radius:20px;padding:24px 28px;color:#fff;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center}
.report-student{display:flex;align-items:center;gap:16px}
.report-avatar{width:56px;height:56px;border-radius:14px;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:28px}
.report-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:14px}
.report-chip{background:#F5F3FF;border-radius:14px;padding:14px 16px}
.rc-label{font-size:10px;font-weight:800;color:#7C6D9B;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
.rc-value{font-size:15px;font-weight:700;color:#1E1B4B}
.mood-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:50px;font-weight:800;font-size:14px}
.activities-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.act-chip{background:#EDE9FE;color:#6D28D9;font-size:12px;font-weight:700;padding:4px 12px;border-radius:50px}

/* MESSAGES */
.msg-list{display:flex;flex-direction:column;gap:4px;max-height:420px;overflow-y:auto;padding:4px;margin-bottom:16px}
.msg-bubble{border-radius:16px;padding:14px 16px;max-width:78%}
.msg-bubble.school{background:#EDE9FE;color:#1E1B4B;align-self:flex-start;border-radius:4px 16px 16px 16px}
.msg-bubble.parent{background:linear-gradient(135deg,#6D28D9,#8B5CF6);color:#fff;align-self:flex-end;border-radius:16px 4px 16px 16px}
.msg-sender{font-size:11px;font-weight:800;opacity:0.7;margin-bottom:4px}
.msg-text{font-size:14px;line-height:1.6}
.msg-time{font-size:11px;opacity:0.6;margin-top:6px;text-align:right}
.msg-input-row{background:#fff;border-radius:16px;padding:14px 16px;box-shadow:0 2px 14px rgba(109,40,217,0.07)}

/* LIGHTBOX */
.lb{position:fixed;inset:0;background:rgba(15,13,46,0.92);z-index:2000;display:flex;align-items:center;justify-content:center;display:none;backdrop-filter:blur(6px)}
.lb.open{display:flex}
.lb-inner{background:#fff;border-radius:24px;overflow:hidden;max-width:700px;width:90%}
.lb-img{width:100%;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center}
.lb-info{padding:18px 22px;display:flex;justify-content:space-between;align-items:center}
.lb-close{position:absolute;top:20px;right:22px;width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,0.15);border:none;color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(6px)}
</style>
</head>
<body>

<div class="header">
  <a href="Maika-Landing.html" class="header-logo">
    <div class="logo-icon">🌸</div>
    <span class="logo-text">Maika</span>
  </a>
  <div class="header-user">
    <div class="user-badge">
      <div class="user-av" id="header-av">MA</div>
      <span id="header-child">Nguyễn Minh An</span>
    </div>
    <a href="Maika-Landing.html" style="font-size:13px;color:#8B83C3;font-weight:700">← Trang chủ</a>
  </div>
</div>

<div class="tabs" id="tab-bar">
  <button class="tab-btn active" onclick="showTab('announcements',this)">📢 Thông báo</button>
  <button class="tab-btn" onclick="showTab('gallery',this)">📸 Hình ảnh</button>
  <button class="tab-btn" onclick="showTab('reports',this)">📝 Nhật ký</button>
  <button class="tab-btn" onclick="showTab('messages',this)">💬 Nhắn tin</button>
</div>

<div class="main">
  <!-- ANNOUNCEMENTS -->
  <div id="page-announcements">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:22px">
      <div>
        <h2 style="font-size:20px;font-weight:800;color:#1E1B4B">Thông báo nhà trường</h2>
        <p style="font-size:13px;color:#7C6D9B;margin-top:4px">Cập nhật mới nhất từ Maika</p>
      </div>
    </div>
    <div id="ann-list"></div>
  </div>

  <!-- GALLERY -->
  <div id="page-gallery" style="display:none">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <div>
        <h2 style="font-size:20px;font-weight:800;color:#1E1B4B">Hình ảnh hoạt động</h2>
        <p style="font-size:13px;color:#7C6D9B;margin-top:4px">Khoảnh khắc của bé tại Maika</p>
      </div>
      <button onclick="document.getElementById('photo-upload').click()" style="padding:9px 18px;border-radius:12px;border:none;background:linear-gradient(135deg,#6D28D9,#8B5CF6);color:#fff;font-weight:700;font-size:13px;box-shadow:0 3px 12px rgba(109,40,217,0.3)">📤 Thêm ảnh</button>
    </div>
    <input type="file" id="photo-upload" accept="image/*" multiple style="display:none" onchange="handleUpload(event)"/>
    <div class="gallery-filters" id="gal-filters"></div>
    <div class="gallery-grid" id="gal-grid"></div>
  </div>

  <!-- REPORTS -->
  <div id="page-reports" style="display:none">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:22px">
      <div>
        <h2 style="font-size:20px;font-weight:800;color:#1E1B4B">Nhật ký hàng ngày</h2>
        <p style="font-size:13px;color:#7C6D9B;margin-top:4px">Theo dõi bé mỗi ngày</p>
      </div>
      <div style="display:flex;gap:10px;align-items:center">
        <input type="date" id="report-date" style="padding:8px 14px;border-radius:10px;border:1.5px solid #DDD6FE;font-size:13px;color:#1E1B4B;background:#fff" onchange="renderReport()"/>
        <button onclick="printReport()" style="padding:9px 18px;border-radius:10px;border:none;background:linear-gradient(135deg,#6D28D9,#8B5CF6);color:#fff;font-weight:700;font-size:13px;box-shadow:0 3px 12px rgba(109,40,217,0.3)">🖨️ In PDF</button>
      </div>
    </div>
    <div id="report-content"></div>
  </div>

  <!-- MESSAGES -->
  <div id="page-messages" style="display:none">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <div>
        <h2 style="font-size:20px;font-weight:800;color:#1E1B4B">Nhắn tin với nhà trường</h2>
        <p style="font-size:13px;color:#7C6D9B;margin-top:4px">Liên lạc với giáo viên và ban giám hiệu</p>
      </div>
    </div>
    <div class="msg-list" id="msg-list"></div>
    <div class="msg-input-row">
      <textarea id="msg-input" rows="3" placeholder="Nhập tin nhắn cho nhà trường..." style="width:100%;border:1.5px solid #DDD6FE;border-radius:12px;padding:10px 14px;font-size:14px;resize:none;color:#1E1B4B"></textarea>
      <div style="display:flex;justify-content:flex-end;margin-top:10px">
        <button onclick="sendMsg()" style="padding:10px 24px;border-radius:10px;border:none;background:linear-gradient(135deg,#6D28D9,#8B5CF6);color:#fff;font-weight:800;font-size:14px;box-shadow:0 3px 12px rgba(109,40,217,0.3)">Gửi →</button>
      </div>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lb" id="lightbox" onclick="closeLB(event)">
  <button class="lb-close" onclick="document.getElementById('lightbox').classList.remove('open')">✕</button>
  <div class="lb-inner">
    <div class="lb-img" id="lb-img"></div>
    <div class="lb-info">
      <div>
        <div style="font-weight:800;font-size:15px;color:#1E1B4B" id="lb-title"></div>
        <div style="font-size:12px;color:#7C6D9B;margin-top:3px" id="lb-date"></div>
      </div>
      <div id="lb-tag" style="font-size:12px;font-weight:800;padding:5px 12px;border-radius:50px"></div>
    </div>
  </div>
</div>

<script src="bb-data.js"></script>
<script>
const STUDENT_ID = 's1';
const db = BB.getDB();
const student = db.students.find(s=>s.id===STUDENT_ID)||db.students[0];
const cls = db.classes.find(c=>c.id===student.classId);

// Update header
document.getElementById('header-child').textContent = student.name+' · '+(cls?.name||'');
document.getElementById('header-av').textContent = student.initials;

// ── TAB SWITCHING ────────────────────────────────────────────────
const PAGES = ['announcements','gallery','reports','messages'];
function showTab(id, btn) {
  PAGES.forEach(p => { document.getElementById('page-'+p).style.display = p===id ? 'block' : 'none'; });
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if (id==='gallery') renderGallery();
  if (id==='reports') renderReport();
  if (id==='messages') renderMessages();
}

// ── ANNOUNCEMENTS ────────────────────────────────────────────────
const ANNS = [
  { id:1, title:'Nghỉ lễ 30/4 – 1/5', body:'Kính gửi quý phụ huynh,\n\nNhà trường thông báo các bé được nghỉ lễ từ Thứ Tư 30/4 đến hết Thứ Sáu 2/5/2026.\n\nCác bé đi học trở lại vào Thứ Hai ngày 5/5/2026.\n\nKính chúc quý phụ huynh và các bé kỳ nghỉ vui vẻ, an toàn!\n\nBan Giám hiệu Maika', date:'24/04/2026', tag:'Nghỉ lễ', tagColor:'#D97706', tagBg:'#FEF3C7', icon:'🎉', important:true },
  { id:2, title:'Họp phụ huynh tháng 5/2026', body:'Kính mời quý phụ huynh tham dự buổi họp tổng kết học kỳ 2 vào lúc 17:30, Thứ Năm ngày 15/5/2026 tại hội trường nhà trường.\n\nNội dung: báo cáo kết quả học tập, kế hoạch hè và năm học mới.\n\nKính mong quý phụ huynh sắp xếp thời gian tham dự.', date:'22/04/2026', tag:'Họp phụ huynh', tagColor:'#6D28D9', tagBg:'#EDE9FE', icon:'📋', important:false },
  { id:3, title:'Khám sức khỏe định kỳ ngày 8/5', body:'Nhà trường phối hợp tổ chức khám sức khỏe định kỳ cho toàn bộ học sinh vào ngày 8/5/2026.\n\nKết quả khám sẽ được gửi về phụ huynh trong vòng 3 ngày sau khám qua ứng dụng.', date:'20/04/2026', tag:'Y tế', tagColor:'#059669', tagBg:'#D1FAE5', icon:'🏥', important:false },
  { id:4, title:'Thông báo học phí tháng 5/2026', body:'Học phí tháng 5 vui lòng nộp từ ngày 1–5/5/2026.\n\nNhà trường nhận thanh toán tiền mặt hoặc chuyển khoản:\nSố TK: 0123 4567 89 — MB Bank\nTên TK: TRUONG MAM NON MAIKA', date:'18/04/2026', tag:'Học phí', tagColor:'#DC2626', tagBg:'#FEE2E2', icon:'💰', important:false },
  { id:5, title:'Menu tháng 5/2026 đã cập nhật', body:'Nhà trường xin thông báo thực đơn tháng 5/2026 đã được cập nhật với nhiều món ăn mới đa dạng, bổ dưỡng.\n\nPhụ huynh có thể xem chi tiết tại bảng thông tin trước cổng trường hoặc hỏi giáo viên chủ nhiệm.', date:'15/04/2026', tag:'Ăn uống', tagColor:'#F59E0B', tagBg:'#FEF3C7', icon:'🍽️', important:false },
];

function renderAnnouncements() {
  const el = document.getElementById('ann-list');
  el.innerHTML = ANNS.map(a => `
    <div class="ann-card${a.important?' important':''}" onclick="this.classList.toggle('open')">
      <div class="ann-header">
        <div class="ann-icon" style="background:${a.tagBg}">${a.icon}</div>
        <div style="flex:1;min-width:0">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">
            <div>
              <span class="ann-tag" style="background:${a.tagBg};color:${a.tagColor}">${a.tag}</span>
              <div class="ann-title">${a.title}</div>
            </div>
            <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
              ${a.important ? '<span style="background:#F59E0B;color:#fff;border-radius:99px;font-size:10px;font-weight:800;padding:2px 8px">📌 QUAN TRỌNG</span>' : ''}
              <span class="ann-date">${a.date}</span>
            </div>
          </div>
        </div>
      </div>
      <div class="ann-body">${a.body}</div>
    </div>
  `).join('');
}
renderAnnouncements();

// ── GALLERY ───────────────────────────────────────────────────────
const PHOTOS = [
  { id:'p1', emoji:'🎨', title:'Giờ vẽ sáng tạo', date:'29/04/2026', tag:'Nghệ thuật', bg:'linear-gradient(135deg,#6D28D9,#A78BFA)', desc:'Vẽ tranh chủ đề gia đình' },
  { id:'p2', emoji:'🍱', title:'Bữa trưa hôm nay', date:'29/04/2026', tag:'Bữa ăn', bg:'linear-gradient(135deg,#F59E0B,#FBBF24)', desc:'Cơm gà xào sả, canh bí đỏ' },
  { id:'p3', emoji:'🏃', title:'Thể dục ngoài sân', date:'28/04/2026', tag:'Vận động', bg:'linear-gradient(135deg,#059669,#34D399)', desc:'Khởi động buổi sáng vui nhộn' },
  { id:'p4', emoji:'🎵', title:'Giờ âm nhạc', date:'28/04/2026', tag:'Nghệ thuật', bg:'linear-gradient(135deg,#EC4899,#F9A8D4)', desc:'Tập bài hát "Cả nhà thương nhau"' },
  { id:'p5', emoji:'😴', title:'Giờ nghỉ trưa', date:'27/04/2026', tag:'Nghỉ ngơi', bg:'linear-gradient(135deg,#0891B2,#38BDF8)', desc:'Giấc ngủ trưa an lành' },
  { id:'p6', emoji:'📚', title:'Đọc sách cùng bạn', date:'27/04/2026', tag:'Học tập', bg:'linear-gradient(135deg,#7C3AED,#C4B5FD)', desc:'Giờ đọc sách tự do' },
  { id:'p7', emoji:'🧩', title:'Trò chơi ghép hình', date:'25/04/2026', tag:'Vui chơi', bg:'linear-gradient(135deg,#D97706,#FBBF24)', desc:'Phát triển tư duy không gian' },
  { id:'p8', emoji:'🌱', title:'Chăm sóc vườn rau', date:'24/04/2026', tag:'Vui chơi', bg:'linear-gradient(135deg,#065F46,#34D399)', desc:'Tưới cây và học về cây trồng' },
  { id:'p9', emoji:'🎭', title:'Kể chuyện sáng tạo', date:'22/04/2026', tag:'Nghệ thuật', bg:'linear-gradient(135deg,#9333EA,#DDD6FE)', desc:'Tiểu phẩm "Ba chú lợn nhỏ"' },
];
let userPhotos = JSON.parse(localStorage.getItem('bb_parent_photos')||'[]');
let galFilter = 'all';

function renderGallery() {
  const tags = ['all',...new Set(PHOTOS.map(p=>p.tag))];
  document.getElementById('gal-filters').innerHTML = tags.map(t=>`
    <button class="gf-btn${t===galFilter?' active':''}" onclick="galFilter='${t}';renderGallery()">${t==='all'?'Tất cả':t}</button>
  `).join('');
  const all = [...PHOTOS, ...userPhotos];
  const filtered = galFilter==='all' ? all : all.filter(p=>p.tag===galFilter);
  document.getElementById('gal-grid').innerHTML = filtered.map(p=>`
    <div class="photo-card" onclick="openLB('${p.id}')">
      <div class="photo-inner" style="background:${p.bg||'linear-gradient(135deg,#6D28D9,#A78BFA)'}">
        ${p.img ? `<img src="${p.img}" style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0"/>` : `<span style="font-size:52px">${p.emoji||'📸'}</span>`}
        <span>${p.title}</span>
      </div>
      <div class="photo-overlay"><span>${p.desc||p.title}</span></div>
      <div class="photo-date">${p.date}</div>
    </div>
  `).join('');
}

function openLB(id) {
  const all = [...PHOTOS,...userPhotos];
  const p = all.find(x=>x.id===id); if (!p) return;
  const lb = document.getElementById('lightbox');
  document.getElementById('lb-img').innerHTML = p.img
    ? `<img src="${p.img}" style="width:100%;height:100%;object-fit:cover"/>`
    : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:90px;background:${p.bg}">${p.emoji||'📸'}</div>`;
  document.getElementById('lb-title').textContent = p.title;
  document.getElementById('lb-date').textContent = p.date;
  document.getElementById('lb-tag').textContent = p.tag||'';
  document.getElementById('lb-tag').style.cssText = `background:#EDE9FE;color:#6D28D9;font-size:12px;font-weight:800;padding:5px 12px;border-radius:50px`;
  lb.classList.add('open');
}
function closeLB(e) { if (e.target===document.getElementById('lightbox')) document.getElementById('lightbox').classList.remove('open'); }

function handleUpload(e) {
  const files = Array.from(e.target.files);
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => {
      const np = { id:'u'+Date.now()+Math.random(), title:file.name.split('.')[0], date:new Date().toLocaleDateString('vi-VN'), tag:'Hình ảnh', img:ev.target.result, emoji:'📸', bg:'linear-gradient(135deg,#6D28D9,#A78BFA)', desc:'Ảnh do phụ huynh tải lên' };
      userPhotos.push(np);
      localStorage.setItem('bb_parent_photos', JSON.stringify(userPhotos));
      renderGallery();
    };
    reader.readAsDataURL(file);
  });
  e.target.value = '';
}

// ── REPORTS ──────────────────────────────────────────────────────
const MOOD_EMOJI = { 'Vui vẻ':'😄','Hào hứng':'🤩','Bình thường':'😊','Mệt mỏi':'😴','Buồn ngủ':'🥱','Khó chịu':'😟' };
const MOOD_COLOR = { 'Vui vẻ':'#16A34A','Hào hứng':'#7C3AED','Bình thường':'#6B6494','Mệt mỏi':'#D97706','Buồn ngủ':'#0891B2','Khó chịu':'#DC2626' };

function renderReport() {
  const dateEl = document.getElementById('report-date');
  if (!dateEl.value) dateEl.value = BB.todayStr();
  const date = dateEl.value;
  const report = db.dailyReports.find(r=>r.studentId===STUDENT_ID&&r.date===date);
  const att = db.attendance.find(a=>a.studentId===STUDENT_ID&&a.date===date);
  const attLabel = att ? ({present:'✅ Có mặt',late:'⏰ Đi trễ',absent:'❌ Vắng mặt'}[att.status]||'—') : '—';
  const el = document.getElementById('report-content');
  if (!report) {
    el.innerHTML = `<div style="background:#fff;border-radius:20px;padding:48px;text-align:center;box-shadow:0 2px 14px rgba(109,40,217,0.07)"><div style="font-size:52px;margin-bottom:12px">📝</div><div style="font-weight:700;font-size:16px;color:#1E1B4B;margin-bottom:8px">Chưa có nhật ký cho ngày này</div><div style="font-size:14px;color:#7C6D9B">Cô giáo chưa ghi nhật ký hoặc bé vắng học ngày ${BB.fmtDate(date)}</div></div>`;
    return;
  }
  const moodColor = MOOD_COLOR[report.mood]||'#6B6494';
  const acts = (report.activities||[]).map(a=>`<span class="act-chip">${a}</span>`).join('');
  el.innerHTML = `
    <div class="report-hero" id="report-printable">
      <div class="report-student">
        <div class="report-avatar">🧒</div>
        <div>
          <div style="font-weight:900;font-size:18px">${student.name}</div>
          <div style="font-size:13px;opacity:0.8">${cls?.name||''} · ${BB.fmtDate(date)}</div>
        </div>
      </div>
      <div style="text-align:right">
        <div style="font-size:12px;opacity:0.7;margin-bottom:4px">Đi học</div>
        <div style="font-weight:800;font-size:15px">${attLabel}</div>
      </div>
    </div>
    <div class="report-grid">
      <div class="report-chip"><div class="rc-label">🍳 Bữa sáng</div><div class="rc-value">${report.breakfast||'—'}</div></div>
      <div class="report-chip"><div class="rc-label">🍱 Bữa trưa</div><div class="rc-value">${report.lunch||'—'}</div></div>
      <div class="report-chip"><div class="rc-label">🍎 Bữa xế</div><div class="rc-value">${report.snack||'—'}</div></div>
      <div class="report-chip"><div class="rc-label">😴 Ngủ trưa</div><div class="rc-value">${report.napDuration>0?report.napDuration+' phút':'Không ngủ'}</div></div>
    </div>
    <div style="background:#fff;border-radius:14px;padding:16px 18px;margin-bottom:12px;box-shadow:0 2px 12px rgba(109,40,217,0.06)">
      <div style="font-size:10px;font-weight:800;color:#7C6D9B;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px">Tâm trạng hôm nay</div>
      <span class="mood-badge" style="background:${moodColor}18;color:${moodColor}">${MOOD_EMOJI[report.mood]||'😊'} ${report.mood||'Bình thường'}</span>
    </div>
    ${acts ? `<div style="background:#fff;border-radius:14px;padding:16px 18px;margin-bottom:12px;box-shadow:0 2px 12px rgba(109,40,217,0.06)"><div style="font-size:10px;font-weight:800;color:#7C6D9B;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px">Hoạt động trong ngày</div><div class="activities-row">${acts}</div></div>` : ''}
    ${report.note ? `<div style="background:#FFFBEB;border-radius:14px;padding:16px 18px;border-left:3px solid #F59E0B;box-shadow:0 2px 12px rgba(109,40,217,0.06)"><div style="font-size:10px;font-weight:800;color:#D97706;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px">Ghi chú từ cô giáo</div><div style="font-size:14px;color:#1E1B4B;line-height:1.7">${report.note}</div></div>` : ''}
  `;
}

function printReport() {
  const dateEl = document.getElementById('report-date');
  const date = dateEl.value || BB.todayStr();
  const report = db.dailyReports.find(r=>r.studentId===STUDENT_ID&&r.date===date);
  if (!report) { alert('Không có nhật ký để in!'); return; }
  const moodColor = MOOD_COLOR[report.mood]||'#6B6494';
  const acts = (report.activities||[]).join(', ');
  const w = window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"/><title>Nhật ký — ${student.name}</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>body{font-family:'Nunito',sans-serif;padding:36px 44px;color:#1E1B4B;max-width:680px;margin:0 auto}
  .hdr{display:flex;align-items:center;gap:16px;margin-bottom:28px;padding-bottom:18px;border-bottom:2px solid #EDE9FE}
  .logo{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,#6D28D9,#A78BFA);display:flex;align-items:center;justify-content:center;font-size:28px}
  h1{font-size:24px;font-weight:900;color:#1E1B4B;margin-bottom:4px}
  .sub{font-size:13px;color:#7C6D9B;font-weight:600}
  .hero{background:linear-gradient(135deg,#6D28D9,#8B5CF6);border-radius:16px;padding:20px 24px;color:#fff;margin-bottom:20px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
  .chip{background:#F5F3FF;border-radius:12px;padding:12px 14px}
  .clabel{font-size:10px;font-weight:800;color:#7C6D9B;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
  .cvalue{font-size:14px;font-weight:700;color:#1E1B4B}
  .note{background:#FFFBEB;border-radius:12px;padding:14px 16px;border-left:3px solid #F59E0B}
  .footer{margin-top:36px;text-align:center;font-size:12px;color:#9B93C9;border-top:1px solid #EDE9FE;padding-top:18px}
  @media print{body{padding:20px}}</style></head><body>
  <div class="hdr"><div class="logo">🌸</div><div><div style="font-weight:900;font-size:18px">Maika Nursery School</div><div class="sub">NHẬT KÝ HÀNG NGÀY</div></div></div>
  <h1>Nhật ký: ${student.name}</h1>
  <p class="sub" style="margin-bottom:20px">${cls?.name||''} · Ngày ${BB.fmtDate(date)}</p>
  <div class="hero"><div style="font-weight:900;font-size:16px;margin-bottom:4px">${student.name}</div><div style="font-size:13px;opacity:0.8">${cls?.name||''} — ${BB.fmtDate(date)}</div></div>
  <div class="grid">
    <div class="chip"><div class="clabel">🍳 Bữa sáng</div><div class="cvalue">${report.breakfast||'—'}</div></div>
    <div class="chip"><div class="clabel">🍱 Bữa trưa</div><div class="cvalue">${report.lunch||'—'}</div></div>
    <div class="chip"><div class="clabel">🍎 Bữa xế</div><div class="cvalue">${report.snack||'—'}</div></div>
    <div class="chip"><div class="clabel">😴 Giấc ngủ trưa</div><div class="cvalue">${report.napDuration>0?report.napDuration+' phút':'Không ngủ'}</div></div>
  </div>
  <div class="chip" style="margin-bottom:12px"><div class="clabel">😊 Tâm trạng</div><div class="cvalue" style="color:${moodColor}">${MOOD_EMOJI[report.mood]||'😊'} ${report.mood||'Bình thường'}</div></div>
  ${acts ? `<div class="chip" style="margin-bottom:12px"><div class="clabel">🎨 Hoạt động</div><div class="cvalue">${acts}</div></div>` : ''}
  ${report.note ? `<div class="note"><div class="clabel" style="color:#D97706">Ghi chú từ cô giáo</div><div class="cvalue" style="margin-top:6px;line-height:1.7">${report.note}</div></div>` : ''}
  <div class="footer">© 2026 Maika Nursery School — Nhật ký được in tự động từ hệ thống quản lý</div>
  </body></html>`);
  w.document.close();
  setTimeout(()=>w.print(),600);
}

// ── MESSAGES ─────────────────────────────────────────────────────
let messages = (() => {
  const msgs = db.messages.filter(m=>m.studentId===STUDENT_ID||m.broadcast);
  const result = [];
  msgs.forEach(m => {
    result.push({ from:'school', name:m.fromRole==='admin'?'🌸 Maika School':'👩‍🏫 Cô giáo', text:m.content, time:new Date(m.date).toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'}) });
    (m.replies||[]).forEach(r => {
      result.push({ from: r.fromRole==='admin'?'school':'parent', name: r.fromRole==='admin'?'🌸 Maika School':'Phụ huynh', text:r.content, time:new Date(r.date).toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'}) });
    });
  });
  return result.length ? result : [{ from:'school', name:'🌸 Maika School', text:'Xin chào phụ huynh! Đây là kênh liên lạc giữa nhà trường và gia đình. Phụ huynh có thể nhắn tin trực tiếp tại đây.', time:'08:00' }];
})();

function renderMessages() {
  const el = document.getElementById('msg-list');
  el.innerHTML = messages.map(m=>`
    <div style="display:flex;flex-direction:column;align-items:${m.from==='parent'?'flex-end':'flex-start'}">
      <div class="msg-bubble ${m.from==='parent'?'parent':'school'}">
        <div class="msg-sender">${m.name}</div>
        <div class="msg-text">${m.text}</div>
        <div class="msg-time">${m.time}</div>
      </div>
    </div>
  `).join('');
  el.scrollTop = el.scrollHeight;
}

function sendMsg() {
  const inp = document.getElementById('msg-input');
  const text = inp.value.trim(); if (!text) return;
  messages.push({ from:'parent', name:'Phụ huynh', text, time:new Date().toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'}) });
  inp.value = '';
  renderMessages();
  setTimeout(()=>{
    messages.push({ from:'school', name:'🌸 Maika School', text:'Cảm ơn phụ huynh đã nhắn tin! Nhà trường sẽ phản hồi sớm nhất có thể trong giờ hành chính (7:00–17:00). Trân trọng!', time:new Date().toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'}) });
    renderMessages();
  }, 1500);
}
</script>
