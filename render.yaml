services:
  # Backend API — Express + SQLite
  - type: web
    name: maika-api
    runtime: node
    region: singapore
    plan: free
    rootDir: .
    buildCommand: npm ci --omit=dev
    startCommand: node server/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MAIKA_API_HOST
        value: 0.0.0.0
      - key: MAIKA_API_PORT
        value: "10000"
      # Persistent disk paths (mount at /data)
      - key: MAIKA_DB_PATH
        value: /data/maika.sqlite
      - key: MAIKA_UPLOAD_DIR
        value: /data/uploads
      - key: MAIKA_BACKUP_DIR
        value: /data/backups
      # Secrets — set in Render Dashboard, NOT here
      - key: MAIKA_JWT_SECRET
        sync: false
      - key: MAIKA_ADMIN_PASSWORD
        sync: false
      - key: MAIKA_TEACHER_PASSWORD
        sync: false
      # CORS — replace with your Netlify domain
      - key: MAIKA_CORS_ORIGIN
        value: https://maikaschool.netlify.app
      # Scheduled backup
      - key: MAIKA_BACKUP_SCHEDULE_ENABLED
        value: "true"
      - key: MAIKA_BACKUP_CRON
        value: "0 2 * * *"
      - key: MAIKA_BACKUP_RETENTION_COUNT
        value: "30"
      - key: MAIKA_BACKUP_RETENTION_DAYS
        value: "30"
    disk:
      name: maika-data
      mountPath: /data
      sizeGB: 1
